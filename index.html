  <style>

    /* ============================================
       RESET & BASE
    ============================================ */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
      --font-heading: 'Archivo Black', sans-serif;
      --font-ui: 'Space Grotesk', sans-serif;
      --header-height: 70px;
      --site-gutter: 4vw;
      --fade-speed: 0.35s;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-ui);
      background-color: var(--white);
      color: var(--black);
      overflow-x: hidden;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ul {
      list-style: none;
    }

    img {
      display: block;
      max-width: 100%;
    }


    /* ============================================
       HEADER
    ============================================ */

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: var(--header-height);
      padding: 0 var(--site-gutter);

      /* Transparent by default — sits over the portfolio bg images */
      background: transparent;
      transition: background 0.3s ease;
    }

    /* Solid white background once user scrolls or on non-portfolio pages */
    .site-header.is-solid {
      background: var(--white);
    }

    .header-inner {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }

    /* --- Logo --- */
    .header-logo a {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      color: var(--black);
      white-space: nowrap;
    }

    /* --- Desktop Nav (center) --- */
    .header-nav {
      display: flex;
      gap: 2.5rem;
      justify-content: center;
    }

    .header-nav a {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      transition: opacity 0.2s ease;
    }

    .header-nav a:hover,
    .header-nav a[aria-current="page"] {
      opacity: 0.5;
    }

    /* --- Social icons (right) --- */
    .header-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1rem;
    }

    .header-social {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .header-social a {
      display: flex;
      align-items: center;
      color: var(--black);
      transition: opacity 0.2s ease;
    }

    .header-social a:hover {
      opacity: 0.5;
    }

    .header-social svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* --- Hamburger (mobile only) --- */
    .burger-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .burger-btn .line {
      display: block;
      width: 22px;
      height: 1px;
      background-color: var(--black);
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform-origin: center;
    }

    /* Burger → X animation */
    .burger-btn.is-open .line:nth-child(1) {
      transform: translateY(3.5px) rotate(45deg);
    }
    .burger-btn.is-open .line:nth-child(2) {
      transform: translateY(-3.5px) rotate(-45deg);
    }


    /* ============================================
       MOBILE MENU OVERLAY
    ============================================ */

    .mobile-menu {
      position: fixed;
      inset: 0;
      z-index: 199;
      background: var(--white);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2rem;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .mobile-menu.is-open {
      opacity: 1;
      pointer-events: all;
    }

    .mobile-menu nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .mobile-menu nav a {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      color: var(--black);
      transition: opacity 0.2s ease;
    }

    .mobile-menu nav a:hover {
      opacity: 0.5;
    }

    .mobile-menu .mobile-social {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .mobile-menu .mobile-social a {
      color: var(--black);
      transition: opacity 0.2s ease;
    }

    .mobile-menu .mobile-social a:hover {
      opacity: 0.5;
    }

    .mobile-menu .mobile-social svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }


    /* ============================================
       PORTFOLIO SECTION (Homepage hero)
    ============================================ */

    .portfolio-section {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* --- Background image layer --- */
    .portfolio-backgrounds {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .portfolio-bg {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--fade-speed) ease;
    }

    .portfolio-bg.is-active {
      opacity: 1;
    }

    /* Subtle white overlay to keep text legible over images */
    .portfolio-bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.18);
      z-index: 1;
    }

    .portfolio-bg img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* --- Project title list --- */
    .portfolio-items {
      position: relative;
      z-index: 10;
      width: 100%;
      text-align: center;
      padding: calc(var(--header-height) + 3rem) var(--site-gutter) 4rem;
    }

    .portfolio-item {
      line-height: 1;
    }

    .portfolio-item a {
      display: inline-block;
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 4.5vw, 5rem);
      color: var(--black);
      padding: 0.18em 0;
      transition: opacity 0.25s ease, color 0.25s ease;
    }

    /* When hovering the list as a whole:
       dim all items... */
    .portfolio-items:hover .portfolio-item a {
      opacity: 0.25;
    }

    /* ...but restore the one being hovered */
    .portfolio-items .portfolio-item:hover a {
      opacity: 1;
    }

    /* When a bg image is visible, switch text to white for legibility */
    .portfolio-section.has-image .portfolio-item a {
      color: var(--white);
    }

    /* Restore full opacity on the actively hovered item even over image */
    .portfolio-section.has-image .portfolio-items:hover .portfolio-item a {
      opacity: 0.25;
      color: var(--white);
    }
    .portfolio-section.has-image .portfolio-items .portfolio-item:hover a {
      opacity: 1;
      color: var(--white);
    }


    /* ============================================
       FOOTER
    ============================================ */

    .site-footer {
      padding: 2.5rem var(--site-gutter);
      text-align: center;
      font-size: 0.72rem;
      font-family: var(--font-ui);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #aaaaaa;
    }

    .site-footer a {
      color: #aaaaaa;
      text-decoration: underline;
      transition: opacity 0.2s ease;
    }

    .site-footer a:hover {
      opacity: 0.6;
    }


    /* ============================================
       RESPONSIVE — MOBILE
    ============================================ */

    @media (max-width: 767px) {
      :root {
        --site-gutter: 6vw;
        --header-height: 60px;
      }

      /* Hide desktop nav and social in header */
      .header-nav,
      .header-social {
        display: none;
      }

      /* Show burger */
      .burger-btn {
        display: flex;
      }

      /* Collapse center column so logo and burger fill the space */
      .header-inner {
        grid-template-columns: 1fr auto;
      }

      .header-nav-col {
        display: none;
      }

      .portfolio-item a {
        font-size: clamp(1.4rem, 7vw, 2.5rem);
        padding: 0.25em 0;
      }
    }

  </style>

       JAVASCRIPT

  <script>

    // ---- PORTFOLIO HOVER EFFECT ----

    const portfolioSection  = document.getElementById('portfolioSection');
    const portfolioItemsList = document.getElementById('portfolioItems');
    const items = document.querySelectorAll('.portfolio-item');
    const bgs   = document.querySelectorAll('.portfolio-bg');

    function showBg(index) {
      // Hide all, then show the matching one
      bgs.forEach(bg => bg.classList.remove('is-active'));
      if (bgs[index]) bgs[index].classList.add('is-active');
      portfolioSection.classList.add('has-image');
    }

    function hideAllBgs() {
      bgs.forEach(bg => bg.classList.remove('is-active'));
      portfolioSection.classList.remove('has-image');
    }

    items.forEach(item => {
      item.addEventListener('mouseenter', () => {
        showBg(parseInt(item.dataset.itemIndex));
      });
    });

    // When mouse leaves the entire list, hide all backgrounds
    portfolioItemsList.addEventListener('mouseleave', () => {
      hideAllBgs();
    });


    // ---- MOBILE MENU ----

    const burgerBtn  = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    let menuIsOpen   = false;

    function toggleMenu() {
      menuIsOpen = !menuIsOpen;
      mobileMenu.classList.toggle('is-open', menuIsOpen);
      burgerBtn.classList.toggle('is-open', menuIsOpen);
      burgerBtn.setAttribute('aria-expanded', menuIsOpen);
      burgerBtn.setAttribute('aria-label', menuIsOpen ? 'Close menu' : 'Open menu');
    }

    burgerBtn.addEventListener('click', toggleMenu);

    // Close menu when a link inside it is clicked
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (menuIsOpen) toggleMenu();
      });
    });

    // Close menu on Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && menuIsOpen) toggleMenu();
    });


    // ---- OPTIONAL: Make header solid on scroll ----
    // (Adds a white bg once you scroll past the header height,
    //  so nav stays readable on other pages or after scrolling)

    const siteHeader = document.getElementById('siteHeader');

    function handleHeaderScroll() {
      if (window.scrollY > 10) {
        siteHeader.classList.add('is-solid');
      } else {
        siteHeader.classList.remove('is-solid');
      }
    }

    window.addEventListener('scroll', handleHeaderScroll, { passive: true });
    handleHeaderScroll(); // Run once on load

  </script>


</body></html>
